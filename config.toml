baseURL = "https://252123.xyz/"
title = "gpchn 栖息地"
theme = "hugo-theme-next"

languageCode = "zh-CN"
defaultContentLanguage = "zh-cn"
hasCJKLanguage = true
paginate = 10

# ---------------------------------------------------------------
# 中文语言配置（所有参数放在这里，确保 SCSS 变量不为空）
# ---------------------------------------------------------------
[languages.zh-cn]
  languageName = "简体中文"
  weight = 1
  [languages.zh-cn.params]
    scheme = "Gemini"                # 必填，可选 Muse/Mist/Pisces/Gemini
    darkmode = true
    author = "gpchn"                 # 改成你的名字
    subtitle = "真的有人会看这个吗"
    description = "年轻的小伙儿渴望建立功勋"
    
    # 头像配置
    [languages.zh-cn.params.avatar]
      url = "/images/avatar.jpeg"    # 你的头像路径
      rounded = true
      rotated = true
    
    # 网站图标
    [languages.zh-cn.params.favicon]
      icon = "/favicon-32x32.ico"
      small = "/favicon-16x16.ico"
      medium = "/favicon-32x32.ico"
    
    # 侧边栏完整参数（缺一不可）
    [languages.zh-cn.params.sidebar]
      position = "left"
      display = "post"
      padding = 18
      offset = 12
      width = 256                         # 不写会触发空值
    
    # 文章元信息
    [languages.zh-cn.params.postMeta]
      itemText = true
      created = true
      updated = true
      categories = true
      wordCount = true
      readTime = true
    
    # 代码块
    [languages.zh-cn.params.codeblock]
      style = "mac"
      copyBtn = true
      maxHeight = 200
    
    # 返回顶部
    [languages.zh-cn.params.backTop]
      enable = true
      sidebar = false
      scrollpercent = true
    
    # 阅读进度条
    [languages.zh-cn.params.readingProgress]
      enable = true
      start = "left"
      position = "top"
      reversed = false
      color = "#37c6c0"
      height = "3px"
    
    # 书签（即使不用也要写，避免空值）
    [languages.zh-cn.params.bookmark]
      enable = true
      color = "#222"
      save = "manual"
    
    # GitHub 横幅
    [languages.zh-cn.params.githubBanner]
      enable = false
      permalink = ""
      title = ""
    
    # 动画相关（全部显式关闭，防止未定义）
    [languages.zh-cn.params.motion]
      enable = false
    [languages.zh-cn.params.pace]
      enable = false
    [languages.zh-cn.params.canvasRibbon]
      enable = false
    [languages.zh-cn.params.fancybox]
      enable = false
    [languages.zh-cn.params.lazyload]
      enable = false
    [languages.zh-cn.params.pangu]
      enable = false
    
    # 字体（虽然不自定义，但需提供空值占位）
    [languages.zh-cn.params.font]
      enable = false
      [languages.zh-cn.params.font.global]
        external = false
        family = ""
        size = ""
    
    # 文章列表主区
    mainSections = ["posts"]
    
    # 页脚年份
    [languages.zh-cn.params.footer]
      since = 2024
      powered = true
    
    # 社交链接（可留空）
    socials = []

# ---------------------------------------------------------------
# 菜单（所有语言共享）
# ---------------------------------------------------------------
[[menu.main]]
  identifier = "home"
  name = "首页"
  pageRef = "/"
  pre = "home"
  weight = 1

[[menu.main]]
  identifier = "archives"
  name = "归档"
  pageRef = "/archives"
  pre = "archive"
  weight = 2

[[menu.main]]
  identifier = "about"
  name = "关于"
  pageRef = "/about"
  pre = "user"
  weight = 3
