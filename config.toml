baseURL = "https://252123.xyz/"
title = "gpchn 栖息地"
theme = "hugo-theme-next"

languageCode = "zh-CN"
#defaultContentLanguage = "zh-cn"
hasCJKLanguage = true

# 每页显示文章数
paginate = 10

# 菜单
[[menu.main]]
    identifier = "home"
    name = "首页"
    pageRef = "/"
    pre = "home"
    weight = 1

[[menu.main]]
    identifier = "archives"
    name = "归档"
    pageRef = "/archives"
    pre = "archive"
    weight = 2

[[menu.main]]
    identifier = "about"
    name = "关于"
    pageRef = "/about"
    pre = "user"
    weight = 3

[params]
    # 页面方案（必填）可选：Muse / Mist / Pisces / Gemini
    scheme = "Gemini"

    # 头像配置（必须是对象格式）
    [params.avatar]
        url = "/images/avatar.jpeg"
        rounded = true
        rotated = true

    # 站点信息
    description = "年轻的小伙儿渴望建立功勋"
    subtitle = "真的有人会看这个吗"
    author = "gpchn"

    [params.favicon]
        icon = "/favicon-32x32.ico"             # 默认的 favicon 图标
        small = "/favicon-16x16.ico" # 小尺寸图标
        medium = "/favicon-32x32.ico"# 中等尺寸图标

    # 暗色模式
    darkmode = true

    # 侧边栏
    [params.sidebar]
        position = "left"
        display = "post"

    # 文章元信息显示
    [params.postMeta]
        itemText = true
        created = true
        updated = true
        categories = true
        wordCount = true
        readTime = true

    # 代码块风格
    [params.codeblock]
        style = "mac"
        copyBtn = true

    # 返回顶部
    [params.backTop]
        enable = true
        scrollpercent = true

    # 阅读进度条
    [params.readingProgress]
        enable = true
        start = "left"
        position = "top"

    # ---------------------------------------
    # 评论系统（Giscus）
    # 等你拿到 repoId 等参数后，取消下面注释并填入即可
    # ---------------------------------------
    # [params.comments]
    #     enable = true
    #     active = "giscus"
    # [params.giscus]
    #     repo = "gpchn/blog"
    #     repoId = ""
    #     category = "Announcements"
    #     categoryId = ""
    #     mapping = "pathname"
    #     theme = "preferred_color_scheme"
