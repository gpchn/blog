baseURL = "https://252123.xyz/"
title = "gpchn 栖息地"
theme = "hugo-theme-next"

languageCode = "zh-CN"
defaultContentLanguage = "zh-cn"
hasCJKLanguage = true
paginate = 10

# 中文语言配置
[languages.zh-cn]
    languageName = "简体中文"
    weight = 1
    [languages.zh-cn.params]
        scheme = "Gemini"
        description = "年轻的小伙儿渴望建立功勋"
        subtitle = "真的有人会看这个吗"
        author = "gpchn"
        avatar = { url = "/images/avatar.jpeg", rounded = true, rotated = true }
        favicon = { icon = "/favicon-32x32.ico", small = "/favicon-16x16.ico", medium = "/favicon-32x32.ico" }
        darkmode = true
        [languages.zh-cn.params.sidebar]
            position = "left"
            display = "post"
        [languages.zh-cn.params.postMeta]
            itemText = true
            created = true
            updated = true
            categories = true
            wordCount = true
            readTime = true
        [languages.zh-cn.params.codeblock]
            style = "mac"
            copyBtn = true
        [languages.zh-cn.params.backTop]
            enable = true
            scrollpercent = true
        [languages.zh-cn.params.readingProgress]
            enable = true
            start = "left"
            position = "top"

# 菜单（可直接放根级，所有语言生效）
[[menu.main]]
    identifier = "home"
    name = "首页"
    pageRef = "/"
    pre = "home"
    weight = 1

[[menu.main]]
    identifier = "archives"
    name = "归档"
    pageRef = "/archives"
    pre = "archive"
    weight = 2

[[menu.main]]
    identifier = "about"
    name = "关于"
    pageRef = "/about"
    pre = "user"
    weight = 3
